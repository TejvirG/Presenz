name: presenz
description: Flutter frontend for Presenz Attendance App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.2
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.10.5+7
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/mock_students.json
    - assets/data/mock_schedule.json
